        // --- 爬樓梯模式：初始化與繪圖 ---
        function initLadder() {
            if (names.length === 0) return;
            const container = document.getElementById('game-ladder');
            const gameArea = document.getElementById('gameArea');
            
            // 計算爬樓梯所需的寬度，若超出畫面則會有捲軸
            let minW = container.clientWidth;
            let canvasH = container.clientHeight || 400; // 預設高度

            // 確保全螢幕狀態下直接取得最終高寬，不受 CSS transition 延遲影響
            if (gameArea.classList.contains('fullscreen-active')) {
                minW = window.innerWidth;
                canvasH = window.innerHeight;
            }

            const colWidth = 70;
            const requiredW = names.length * colWidth + 60; 
            const canvasW = Math.max(minW, requiredW);

            ladderCanvas.width = canvasW;
            ladderCanvas.height = canvasH;

            // 當名單人數改變時重新產生橫向橋樑
            if (ladderBridges.length === 0 || lastLadderNameCount !== names.length) {
                ladderBridges = [];
                for (let r = 1; r <= 12; r++) { // 12階高度
                    let c = 0;
                    while (c < names.length - 1) {
                        // 以 50% 的機率產生橫向橋樑，並避開左右相鄰以免路徑混亂
                        if (Math.random() > 0.5) {
                            ladderBridges.push({ row: r, col: c });
                            c += 2; 
                        } else {
                            c += 1;
                        }
                    }
                }
                lastLadderNameCount = names.length;
            }

            drawLadder();
        }

        function drawLadder() {
            const width = ladderCanvas.width;
            const height = ladderCanvas.height;
            ladderCtx.clearRect(0, 0, width, height);

            if (names.length === 0) return;

            const marginY = 80;
            const bottomMarginY = 60;
            const colWidth = 70;
            
            // 讓整個樓梯在畫面上置中
            const totalLadderW = (names.length - 1) * colWidth;
            const startX = (width - totalLadderW) / 2;
            const rowHeight = (height - marginY - bottomMarginY) / 13;

            // 畫垂直線
            ladderCtx.strokeStyle = '#cbd5e1'; 
            ladderCtx.lineWidth = 4;
            ladderCtx.lineCap = 'round';

            for (let c = 0; c < names.length; c++) {
                const x = startX + c * colWidth;
                ladderCtx.beginPath();
                ladderCtx.moveTo(x, marginY);
                ladderCtx.lineTo(x, height - bottomMarginY);
                ladderCtx.stroke();

                // 畫最上方參與者名字 (傾斜設計)
                ladderCtx.save();
                ladderCtx.translate(x, marginY - 15);
                ladderCtx.rotate(-Math.PI / 4); 
                ladderCtx.textAlign = 'left';
                ladderCtx.textBaseline = 'middle';
                ladderCtx.fillStyle = '#475569';
                ladderCtx.font = 'bold 16px "Noto Sans TC"';
                let txt = names[c];
                if(txt.length > 5) txt = txt.substring(0,4) + '..';
                ladderCtx.fillText(txt, 0, 0);
                ladderCtx.restore();
                
                // 畫底部的禮物/結果點
                ladderCtx.fillStyle = '#94a3b8';
                if (ladderAnimState.active && c === ladderAnimState.startCol) {
                    ladderCtx.fillStyle = '#ef4444'; // 動畫時標示起始點為紅色
                }
                ladderCtx.beginPath();
                ladderCtx.arc(x, height - bottomMarginY + 10, 6, 0, Math.PI*2);
                ladderCtx.fill();
            }

            // 畫橫向橋樑
            for (let b of ladderBridges) {
                const x1 = startX + b.col * colWidth;
                const x2 = startX + (b.col + 1) * colWidth;
                const y = marginY + b.row * rowHeight;
                ladderCtx.beginPath();
                ladderCtx.moveTo(x1, y);
                ladderCtx.lineTo(x2, y);
                ladderCtx.stroke();
            }

            // 若動畫正在進行中，畫出已走過的軌跡
            if (ladderAnimState.active && ladderAnimState.points.length > 0) {
                ladderCtx.strokeStyle = '#ef4444'; // 紅色軌跡
                ladderCtx.lineWidth = 6;
                ladderCtx.beginPath();
                
                const pts = ladderAnimState.points;
                ladderCtx.moveTo(pts[0].x, pts[0].y);

                // 畫出已經完成的段落
                for (let i = 1; i <= ladderAnimState.currentIdx; i++) {
                    ladderCtx.lineTo(pts[i].x, pts[i].y);
                }

                // 畫出正在進行中的段落
                if (ladderAnimState.currentIdx < pts.length - 1) {
                    const p1 = pts[ladderAnimState.currentIdx];
                    const p2 = pts[ladderAnimState.currentIdx + 1];
                    const curX = p1.x + (p2.x - p1.x) * ladderAnimState.progress;
                    const curY = p1.y + (p2.y - p1.y) * ladderAnimState.progress;
                    ladderCtx.lineTo(curX, curY);

                    // 在目前位置畫一顆會發光的星星圓點
                    ladderCtx.fillStyle = '#fef08a'; 
                    ladderCtx.strokeStyle = '#ef4444';
                    ladderCtx.lineWidth = 3;
                    ladderCtx.beginPath();
                    ladderCtx.arc(curX, curY, 8, 0, Math.PI*2);
                    ladderCtx.fill();
                    ladderCtx.stroke();
                } else {
                    // 抵達終點
                    const pEnd = pts[pts.length - 1];
                    ladderCtx.fillStyle = '#fef08a';
                    ladderCtx.strokeStyle = '#ef4444';
                    ladderCtx.lineWidth = 3;
                    ladderCtx.beginPath();
                    ladderCtx.arc(pEnd.x, pEnd.y, 8, 0, Math.PI*2);
                    ladderCtx.fill();
                    ladderCtx.stroke();
                }
                ladderCtx.stroke();
            }
        }

        // --- 核心抽獎分流 ---
        function startDrawFlow() {
            if (isSpinning) return;
            updateNamesArray();
            
            if (names.length === 0) {
                showModal('錯誤', '名單不能為空！', 'error');
                return;
            }

            const requestCount = parseInt(document.getElementById('winnerCount').value, 10);
            if (isNaN(requestCount) || requestCount <= 0) {
                showModal('錯誤', '請輸入有效的抽獎人數！', 'error');
                return;
            }

            currentBatchTarget = Math.min(requestCount, names.length);
            currentBatchDrawn = 0;
            currentBatchWinners = []; 
            
            // 進入全螢幕模式
            enterFullscreen();
            
            triggerSpin();
        }

        function triggerSpin() {
            if (names.length === 0) {
                showModal('完成', `名單已抽完！本次共抽出 ${currentBatchDrawn} 人。`, 'success');
                document.getElementById('cardPromptContainer').classList.add('opacity-0');
                document.getElementById('scratchPromptContainer').classList.add('opacity-0');
                return;
            }

            hideSplash(); 
            isSpinning = true;

            if (currentMode === 'wheel') {
                // 轉盤模式：靠物理旋轉選出幸運兒
                spinVelocity = Math.random() * 0.15 + 0.35; 
                animateSpin();
            } else if (currentMode === 'claw') {
                // 娃娃機模式：自動抓取動畫
                const winnerIndex = Math.floor(Math.random() * names.length);
                const winner = names[winnerIndex];
                animateClaw(winner, winnerIndex);
            } else if (currentMode === 'gacha') {
                // 扭蛋模式：自動動畫
                const winnerIndex = Math.floor(Math.random() * names.length);
                const winner = names[winnerIndex];
                animateGacha(winner, winnerIndex);
            } else if (currentMode === 'ladder') {
                // 延遲一點點，讓全螢幕 CSS 尺寸生效後，重抓正確的畫布解析度
                setTimeout(() => {
                    initLadder();
                    // 爬樓梯模式：由下而上動態尋找對應的姓名
                    animateLadderRunner();
                }, 50); 
            } else if (currentMode === 'card') {
                const promptContainer = document.getElementById('cardPromptContainer');
                const prompt = document.getElementById('cardPrompt');

                waitingForCardClick = false; // 先鎖定點擊
                promptContainer.classList.add('opacity-0', 'pointer-events-none'); // 隱藏按鈕列與提示

                if (currentBatchDrawn === 0) {
                    // 如果是這批抽獎的第一次，先初始化網格
                    initCardGrid();
                    
                    // 延遲 100ms 讓畫面有時間生成卡片後，執行「亮牌->蓋牌->洗牌」動畫流程
                    setTimeout(() => {
                        doCardRevealAndShuffle(() => {
                            waitingForCardClick = true;
                            prompt.textContent = `請點擊卡片抽出幸運兒！ (第 ${currentBatchDrawn + 1} / ${currentBatchTarget} 位)`;
                            promptContainer.classList.remove('opacity-0', 'pointer-events-none');
                        });
                    }, 100);

                } else {
                    // 翻牌模式後續抽取：一樣觸發「亮牌->蓋牌->洗牌」動畫流程
                    doCardRevealAndShuffle(() => {
                        waitingForCardClick = true;
                        prompt.textContent = `請點擊卡片抽出幸運兒！ (第 ${currentBatchDrawn + 1} / ${currentBatchTarget} 位)`;
                        promptContainer.classList.remove('opacity-0', 'pointer-events-none');
                    });
                }
            } else if (currentMode === 'scratch') {
                if (currentBatchDrawn === 0) {
                    initScratchGrid();
                }
                // 刮刮樂模式解鎖
                waitingForScratchClick = true;
                const prompt = document.getElementById('scratchPrompt');
                prompt.textContent = `請刮開塗層抽出幸運兒！ (第 ${currentBatchDrawn + 1} / ${currentBatchTarget} 位)`;
                document.getElementById('scratchPromptContainer').classList.remove('opacity-0');
                document.getElementById('scratchPromptContainer').classList.remove('pointer-events-none');
            }
        }

        // --- 1. 幸運轉盤動畫 ---
        function animateSpin() {
            currentRotation += spinVelocity;
            currentRotation %= (2 * Math.PI); 
            spinVelocity *= 0.985; 
            drawWheel();

            if (spinVelocity > 0.002) {
                animationFrameId = requestAnimationFrame(animateSpin);
            } else {
                spinVelocity = 0;
                determineWheelWinner();
            }
        }

        function determineWheelWinner() {
            const sliceAngle = (2 * Math.PI) / names.length;
            let pointerAngleRelativeToWheel = (-Math.PI / 2 - currentRotation) % (2 * Math.PI);
            if (pointerAngleRelativeToWheel < 0) pointerAngleRelativeToWheel += 2 * Math.PI;

            const winnerIndex = Math.floor(pointerAngleRelativeToWheel / sliceAngle);
            const winner = names[winnerIndex];
            processWinner(winner, winnerIndex);
        }

        // --- 2. 抓取娃娃機動畫 ---
        function animateClaw(winner, index) {
            const prongLeft = document.getElementById('prong-left');
            const prongRight = document.getElementById('prong-right');

            // 初始復原狀態 (張開爪子)
            clawArm.style.transition = 'none';
            clawString.style.transition = 'none';
            clawPrize.classList.add('opacity-0');
            clawArm.style.transform = `translateX(-50%)`;
            clawString.style.height = '20px';
            prongLeft.style.transform = 'rotate(35deg)';
            prongRight.style.transform = 'rotate(-35deg)';
            
            void clawArm.offsetWidth; // 強制瀏覽器重繪

            // 1. 爪子水平移動到隨機位置
            const randomX = (Math.random() - 0.5) * 150; // -75px 到 75px
            clawArm.style.transition = 'transform 1s ease-in-out';
            clawArm.style.transform = `translateX(calc(-50% + ${randomX}px))`;

            setTimeout(() => {
                // 2. 爪子下降 (動態取得容器高度，確保任何螢幕尺寸都能精準放到底部抓取)
                const containerHeight = document.querySelector('#game-claw > div').offsetHeight;
                // 修正：將原本的 -150 改為 -100，讓爪子繩子能放得更長，確實探入底部獎品區
                const dropHeight = (containerHeight - 100) + 'px'; 
                
                clawString.style.transition = 'height 1s ease-in';
                clawString.style.height = dropHeight;

                setTimeout(() => {
                    // 3. 爪子收合抓取
                    prongLeft.style.transform = 'rotate(-10deg)';
                    prongRight.style.transform = 'rotate(10deg)';

                    setTimeout(() => {
                        // 4. 顯示抓到的禮物
                        clawPrize.classList.remove('opacity-0');
                        
                        // 5. 爪子收回
                        clawString.style.transition = 'height 1s ease-out';
                        clawString.style.height = '20px';

                        setTimeout(() => {
                            // 6. 動畫結束，打開爪子放開禮物並顯示結果
                            prongLeft.style.transform = 'rotate(35deg)';
                            prongRight.style.transform = 'rotate(-35deg)';
                            clawPrize.classList.add('opacity-0');
                            
                            setTimeout(() => {
                                processWinner(winner, index);
                            }, 300);

                        }, 1200);
                    }, 400); // 爪子收合停頓 0.4s
                }, 1000); // 下降時間 1s
            }, 1000); // 水平移動時間 1s
        }

        // --- 3. 翻牌抽籤動畫 (手動點擊觸發) ---
        function handleCardClick(cardElement) {
            // 如果不在等待點擊狀態、或卡片已經翻開了，就不做反應
            if (!waitingForCardClick || cardElement.classList.contains('flipped')) return;
            
            waitingForCardClick = false; // 鎖死點擊，防止連續點擊多張卡片
            
            // 隱藏提示字與洗牌按鈕，並設為 pointer-events-none 防止動畫期間誤觸
            const promptContainer = document.getElementById('cardPromptContainer');
            promptContainer.classList.add('opacity-0'); 
            promptContainer.classList.add('pointer-events-none');

            // 取得這張卡片綁定的真實名字
            const winner = cardElement.dataset.name;
            
            // 找出這個名字在當前最新名單中的索引（用於抽後移除的邏輯）
            const winnerIndex = names.indexOf(winner);
            
            // 觸發 CSS 翻牌動畫，並移除滑鼠游標變化的效果
            cardElement.classList.add('flipped');
            cardElement.classList.remove('hover:-translate-y-1', 'cursor-pointer'); 

            // 等待翻牌動畫播完後顯示中獎特效
            setTimeout(() => {
                // 確保即使名單因為某些原因找不到此人，依然能顯示名字
                processWinner(winner, winnerIndex !== -1 ? winnerIndex : 0);
            }, 1200); 
        }

        // --- 4. 扭蛋機動畫 ---
        function animateGacha(winner, index) {
            // 初始復原狀態
            gachaDial.style.transition = 'transform 0.7s ease-in-out';
            gachaPrize.style.transition = 'none';
            gachaPrize.style.transform = 'translateY(-100px)';
            gachaPrize.innerHTML = '🥚'; // 一般扭蛋符號

            void gachaPrize.offsetWidth; // 強制重繪
            
            // 1. 旋鈕轉動 & 機器內扭蛋搖晃
            gachaDial.style.transform = 'rotate(360deg)';
            
            // 給所有的球加上搖晃動畫
            Array.from(gachaBalls.children).forEach(ball => {
                ball.classList.add('animate-gacha-shake');
                // 給一點隨機延遲讓搖晃看起來不會全部同步，更真實
                ball.style.animationDelay = `${Math.random() * 0.2}s`;
            });

            // 2. 轉完後掉出扭蛋
            setTimeout(() => {
                // 停止搖晃
                Array.from(gachaBalls.children).forEach(ball => {
                    ball.classList.remove('animate-gacha-shake');
                });

                // 掉落動畫
                gachaPrize.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                gachaPrize.style.transform = 'translateY(0)'; 

                // 3. 打開扭蛋並顯示結果
                setTimeout(() => {
                    gachaPrize.style.transition = 'transform 0.3s ease-out';
                    gachaPrize.style.transform = 'translateY(0) scale(1.3)';
                    gachaPrize.innerHTML = '🎊'; // 開獎符號
                    
                    setTimeout(() => {
                        processWinner(winner, index);
                        // 準備下一次，旋鈕歸位
                        setTimeout(() => {
                            gachaDial.style.transition = 'none';
                            gachaDial.style.transform = 'rotate(0deg)';
                        }, 500);
                    }, 500);
                }, 800);
            }, 800);
        }

        // --- 5. 爬樓梯動畫 ---
        function animateLadderRunner() {
            // 解析需要走的路徑
            const width = ladderCanvas.width;
            const height = ladderCanvas.height;
            const marginY = 80;
            const bottomMarginY = 60;
            const colWidth = 70;
            const totalLadderW = (names.length - 1) * colWidth;
            const startX = (width - totalLadderW) / 2;
            const rowHeight = (height - marginY - bottomMarginY) / 13;

            // 從底部的隨機一個出發點開始往上爬
            let col = Math.floor(Math.random() * names.length); 
            let startCol = col;
            let points = [];
            
            let cx = startX + col * colWidth;
            let cy = height - bottomMarginY + 10;
            points.push({x: cx, y: cy});

            // 尋找路線與轉彎處 (由下而上：r 從 12 遞減到 1)
            for (let r = 12; r >= 1; r--) {
                cy = marginY + r * rowHeight;
                points.push({x: cx, y: cy});

                // 檢查左右是否有橋樑
                let hasBridgeRight = ladderBridges.some(b => b.row === r && b.col === col);
                let hasBridgeLeft = ladderBridges.some(b => b.row === r && b.col === col - 1);

                if (hasBridgeRight) {
                    col++;
                    cx = startX + col * colWidth;
                    points.push({x: cx, y: cy});
                } else if (hasBridgeLeft) {
                    col--;
                    cx = startX + col * colWidth;
                    points.push({x: cx, y: cy});
                }
            }
            cy = marginY;
            points.push({x: cx, y: cy});

            // 抵達頂端，這時停留的欄位才是真正的中獎者！
            const winnerIndex = col;
            const winner = names[winnerIndex];

            // 設定動畫初始狀態
            ladderAnimState = {
                active: true,
                points: points,
                currentIdx: 0,
                progress: 0,
                startCol: startCol
            };

            const container = document.getElementById('game-ladder');

            function step() {
                if (!ladderAnimState.active) return;
                
                // 動畫速度 (常數速度)
                const p1 = ladderAnimState.points[ladderAnimState.currentIdx];
                const p2 = ladderAnimState.points[ladderAnimState.currentIdx + 1];
                const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                
                // 【速度優化】將速度降下來，每一幀只前進 3.5 像素
                const speed = 3.5 / Math.max(dist, 1); 

                ladderAnimState.progress += speed;

                if (ladderAnimState.progress >= 1) {
                    ladderAnimState.progress = 0;
                    ladderAnimState.currentIdx++;
                }

                drawLadder();

                // 水平自動捲動跟隨視角 (如果名單太長出現捲軸時)
                if (ladderAnimState.currentIdx < ladderAnimState.points.length - 1) {
                    const curP1 = ladderAnimState.points[ladderAnimState.currentIdx];
                    const curP2 = ladderAnimState.points[ladderAnimState.currentIdx + 1];
                    const curX = curP1.x + (curP2.x - curP1.x) * ladderAnimState.progress;
                    
                    const targetScroll = curX - container.clientWidth / 2;
                    container.scrollLeft += (targetScroll - container.scrollLeft) * 0.15; // 平滑跟隨
                }

                if (ladderAnimState.currentIdx < ladderAnimState.points.length - 1) {
                    requestAnimationFrame(step);
                } else {
                    // 動畫抵達終點，停頓一下顯示勝利結果
                    setTimeout(() => {
                        ladderAnimState.active = false;
                        processWinner(winner, winnerIndex);
                    }, 500);
                }
            }
            
            requestAnimationFrame(step);
        }

        // --- 共同中獎後處理邏輯 ---
        function processWinner(winner, index) {
            winners.push(winner);
            currentBatchWinners.push(winner); 
            currentBatchDrawn++;
            renderWinners();

            const removeAfter = document.getElementById('removeWinner').checked;
            if (removeAfter) {
                names.splice(index, 1);
                nameListInput.innerText = names.join('\n');
                updateNamesArray(); 
                
                // 畫面強制重繪
                if(currentMode === 'wheel') drawWheel(); 
                if(currentMode === 'ladder') {
                    // 強制清除橋樑以便重新根據剩餘人數生成新的樓梯
                    ladderBridges = [];
                    initLadder();
                }
            }

            const hasNext = currentBatchDrawn < currentBatchTarget && names.length > 0;
            
            showSplash(winner, hasNext);

            if (hasNext) {
                autoNextTimeout = setTimeout(() => {
                    hideSplash();
                    // 等待 Splash 隱藏後，再觸發下一次抽獎邏輯 (如翻牌模式會重新顯示提示字)
                    setTimeout(triggerSpin, 400); 
                }, 2000);
            } else {
                // 抽獎完全結束
                setTimeout(() => {
                    hideSplash();
                    setTimeout(() => {
                        isSpinning = false; // 解除鎖定
                        
                        // 恢復盲盒/扭蛋初始狀態 (如果是這些模式)
                        if (currentMode === 'gacha') {
                            gachaDial.style.transition = 'none';
                            gachaDial.style.transform = 'rotate(0deg)';
                        }

                        // 修正 1：移除 mb-3 與 break-inside-avoid，改用 Grid 的間距控制，並加上 h-full 確保等高置中
                        const batchWinnersHtml = currentBatchWinners.map(w => 
                            `<div class="bg-indigo-50 text-indigo-800 border-2 border-indigo-200 px-3 py-3 md:py-4 rounded-xl font-black shadow-sm text-2xl md:text-3xl text-center truncate w-full flex items-center justify-center h-full" title="${w}">${w}</div>`
                        ).join('');

                        // 修正 2：將 Columns 改為 Grid (網格) 排版，徹底解決向左偏的問題，保證絕對置中
                        let gridClass = 'grid grid-cols-1 w-full max-w-[280px] mx-auto';
                        if (currentBatchWinners.length === 2) {
                            gridClass = 'grid grid-cols-2 w-full';
                        } else if (currentBatchWinners.length >= 3) {
                            gridClass = 'grid grid-cols-2 md:grid-cols-3 w-full';
                        }

                        showModal('抽獎完成', `
                            <div class="flex flex-col items-center justify-center w-full gap-2 mb-4 md:mb-6">
                                <span class="font-bold">本次抽獎已順利結束！</span>
                                <span class="font-bold">共抽出 <strong class="text-indigo-600 text-2xl">${currentBatchDrawn}</strong> 位幸運兒：</span>
                            </div>
                            <!-- 套用全新的網格排版 -->
                            <div class="w-full max-h-[50vh] overflow-y-auto custom-scrollbar p-2">
                                <div class="${gridClass} gap-3">
                                    ${batchWinnersHtml}
                                </div>
                            </div>
                        `, 'success');
                    }, 400);
                }, 2000);
            }
        }

        // --- 中間提示動畫 ---
        function showSplash(name, hasNext) {
            splashWinnerName.textContent = name;
            if (hasNext) {
                splashNextText.classList.remove('hidden');
            } else {
                splashNextText.classList.add('hidden');
            }
            centerSplash.classList.remove('opacity-0', 'scale-50');
            centerSplash.classList.add('opacity-100', 'scale-100');
        }

        function hideSplash() {
            centerSplash.classList.remove('opacity-100', 'scale-100');
            centerSplash.classList.add('opacity-0', 'scale-50');
        }

        // --- 中獎名單 UI 更新 ---
        function renderWinners() {
            winnerCountDisplay.textContent = winners.length;
            if (winners.length === 0) {
                winnersContainer.innerHTML = '<p class="text-gray-400 text-sm italic w-full text-center mt-2">尚未產生中獎者</p>';
                return;
            }
            winnersContainer.innerHTML = winners.map((w, i) => `
                <div class="bg-white border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-2 font-bold animate-fade-in text-base md:text-lg">
                    <span class="bg-indigo-100 text-indigo-500 text-xs rounded-full w-6 h-6 flex items-center justify-center">${i + 1}</span>
                    ${w}
                </div>
            `).join('');
            winnersContainer.scrollTop = winnersContainer.scrollHeight;
        }

        function clearWinners() {
            winners = [];
            renderWinners();
        }

        // --- 對話框邏輯 ---
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalIcon = document.getElementById('modalIcon');

        function showModal(title, message, type = 'info') {
            clearTimeout(autoNextTimeout); 
            modalTitle.textContent = title;
            modalMessage.innerHTML = message;

            if (type === 'success') {
                modalIcon.className = 'mx-auto w-16 h-16 md:w-20 md:h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-4 md:mb-6';
                modalIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
            } else if (type === 'error') {
                modalIcon.className = 'mx-auto w-16 h-16 md:w-20 md:h-20 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-4 md:mb-6';
                modalIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                isSpinning = false; // 發生錯誤時解除鎖定
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex'); 
            void modal.offsetWidth;
            modal.classList.add('opacity-100');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        function closeModal() {
            modal.classList.remove('opacity-100');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex'); 
                modal.classList.add('hidden');
                
                // 當關閉「抽獎完成」對話框時，也順便退出全螢幕
                exitFullscreen();
            }, 300); 
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } } .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }`;
        document.head.appendChild(style);

        init();
    </script>
</body>
</html>
