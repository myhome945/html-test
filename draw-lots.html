<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試抽測籤系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 SheetJS 處理 Excel 檔案 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        canvas {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: transform 0.1s;
        }
        /* 自訂捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 針對可編輯 div 的 placeholder 樣式 */
        #nameList:empty::before {
            content: attr(placeholder);
            color: #9ca3af;
            cursor: text;
        }

        /* 隱藏數字輸入框的預設箭頭 */
        .number-hide-arrows::-webkit-outer-spin-button,
        .number-hide-arrows::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .number-hide-arrows {
            -moz-appearance: textfield;
        }
        
        /* 全螢幕模式樣式 */
        .fullscreen-active {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            z-index: 50 !important;
            background: radial-gradient(circle at center, #ffffff 0%, #f3f4f6 100%) !important;
            margin: 0 !important;
            padding: 2rem !important;
            border-radius: 0 !important;
        }
        .fullscreen-active #gameTabs,
        .fullscreen-active #drawControlBar {
            display: none !important; /* 全螢幕時隱藏頁籤與設定列 */
        }
        /* 全螢幕時讓遊戲元素稍微放大 */
        .fullscreen-active #game-claw > div {
            max-width: 600px !important;
            max-height: 550px !important;
        }

        /* 3D 卡片翻轉樣式 */
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card { transition: z-index 0.6s; z-index: 1; }
        .card.flipped { z-index: 10; }
        .card.flipped .card-inner { transform: rotateY(180deg) scale(1.15); box-shadow: 0 15px 25px rgba(0,0,0,0.2); }

        /* 洗牌換位動畫 */
        @keyframes card-shuffle {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(0.9) rotate(-5deg); }
            50% { transform: scale(0.9) rotate(5deg); }
            75% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .animate-card-shuffle {
            animation: card-shuffle 0.4s ease-in-out;
        }

        /* 扭蛋機搖晃動畫 */
        @keyframes gacha-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-4px, -15px) rotate(-15deg); }
            40% { transform: translate(6px, 5px) rotate(25deg); }
            60% { transform: translate(-8px, -5px) rotate(-10deg); }
            80% { transform: translate(4px, 15px) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .animate-gacha-shake {
            animation: gacha-shake 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) infinite;
        }

        /* 刮刮樂觸控防止預設滾動 */
        .scratch-canvas {
            touch-action: none;
        }
    </style>
</head>
<body class="min-h-[100dvh] lg:h-screen lg:overflow-hidden text-gray-800 p-3 md:p-4 flex flex-col items-center">

    <header class="flex-shrink-0 text-center mb-3 w-full max-w-6xl">
        <h1 class="text-2xl md:text-4xl font-black text-indigo-600 tracking-wider flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M2 12h20"/><path d="m4.93 4.93 14.14 14.14"/><path d="m4.93 19.07 14.14-14.14"/><circle cx="12" cy="12" r="10"/></svg>
            多功能抽籤機
        </h1>
    </header>

    <main class="w-full max-w-7xl flex flex-col lg:flex-row gap-4 lg:gap-6 flex-1 min-h-0">
        
        <!-- 左側設定區 (手機版移至下方 order-2，電腦版維持左側 order-1) -->
        <div class="w-full lg:w-1/3 flex flex-col gap-4 h-full lg:overflow-y-auto no-scrollbar pb-4 lg:pb-0 order-2 lg:order-1">
            
            <!-- 中獎名單展示區 (響應式高度) -->
            <div class="glass-panel rounded-2xl p-4 md:p-5 border border-white/50 flex-shrink-0 flex flex-col h-[180px] lg:h-[22vh] lg:min-h-[160px] lg:max-h-[220px]">
                <div class="flex justify-between items-center mb-2 flex-shrink-0">
                    <h2 class="text-lg font-bold flex items-center gap-2 text-indigo-700">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        中獎名單 (<span id="winnerCountDisplay">0</span>)
                    </h2>
                    <button onclick="clearWinners()" class="text-xs px-2 py-1 bg-red-100 text-red-600 rounded hover:bg-red-200 transition font-medium">清空紀錄</button>
                </div>
                
                <div id="winnersContainer" class="custom-scrollbar flex-1 overflow-y-auto flex flex-wrap content-start gap-2 p-2 bg-gray-50 rounded-xl border border-gray-100">
                    <p class="text-gray-400 text-sm italic w-full text-center mt-2">尚未產生中獎者</p>
                </div>
            </div>

            <!-- 名單面板 (響應式高度) -->
            <div class="glass-panel rounded-2xl p-4 md:p-5 border border-white/50 flex flex-col flex-1 min-h-[250px] lg:min-h-[320px]">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-indigo-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/><path d="M8 11h8"/><path d="M8 15h8"/></svg>
                    參與名單
                </h2>
                
                <!-- Excel 匯入與範本下載 -->
                <div class="flex gap-2 mb-3">
                    <button onclick="document.getElementById('excelUpload').click()" class="flex-1 bg-green-500 hover:bg-green-600 text-white text-sm font-bold py-2 px-2 rounded-lg flex items-center justify-center gap-1 transition shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        匯入 Excel
                    </button>
                    <button onclick="downloadTemplate()" class="flex-1 bg-white border-2 border-green-500 text-green-600 hover:bg-green-50 text-sm font-bold py-2 px-2 rounded-lg flex items-center justify-center gap-1 transition shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        下載範本
                    </button>
                    <input type="file" id="excelUpload" class="hidden" accept=".xlsx, .xls, .csv">
                </div>

                <!-- 修正橫向溢出問題：外層負責垂直捲動，內層負責固定的 4 個直行 -->
                <div onclick="document.getElementById('nameList').focus()" class="custom-scrollbar flex-1 w-full overflow-y-auto bg-gray-50 border border-gray-200 rounded-xl transition-all focus-within:ring-2 focus-within:ring-indigo-400 p-3 cursor-text">
                    <div id="nameList" contenteditable="true" class="w-full min-h-[100px] outline-none text-lg font-medium leading-relaxed columns-4 gap-4 md:gap-6 whitespace-pre-wrap break-words" placeholder="請輸入名單，或透過上方匯入 Excel..."></div>
                </div>
                
                <div class="flex justify-between items-center mt-3 text-sm text-gray-500 font-medium">
                    <span>目前人數：<span id="peopleCount" class="text-indigo-600 font-bold text-base">0</span> 人</span>
                    <button onclick="resetList()" class="text-gray-400 hover:text-red-500 transition-colors bg-gray-100 hover:bg-red-50 px-2 py-1 rounded">清除名單</button>
                </div>
            </div>
        </div>

        <!-- 右側/中間區域 (多遊戲模式展示區) -->
        <div id="gameArea" class="w-full lg:w-2/3 flex flex-col h-full min-h-[400px] lg:min-h-0 transition-all duration-300 order-1 lg:order-2">
            
            <!-- 抽獎設定控制列 (統一置頂) -->
            <div id="drawControlBar" class="glass-panel rounded-2xl p-3 md:p-4 mb-3 border border-white/50 flex-shrink-0 w-full flex flex-col sm:flex-row items-center gap-3 md:gap-4 z-10">
                <div class="flex items-center gap-3 md:gap-6 w-full sm:w-auto justify-center sm:justify-start">
                    <!-- 抽出人數 (加上快捷加減按鈕) -->
                    <div class="flex items-center gap-1.5 bg-white/60 px-2 py-1.5 rounded-lg border border-gray-100 shadow-sm">
                        <label for="winnerCount" class="font-bold text-gray-700 text-sm whitespace-nowrap pl-1">抽出</label>
                        <button onclick="adjustWinnerCount(-1)" class="w-7 h-7 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-md text-gray-700 font-bold transition active:scale-95 focus:outline-none">&minus;</button>
                        <input type="number" id="winnerCount" value="1" min="1" class="w-8 text-center bg-transparent focus:outline-none font-black text-indigo-700 text-lg number-hide-arrows">
                        <button onclick="adjustWinnerCount(1)" class="w-7 h-7 flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-md text-gray-700 font-bold transition active:scale-95 focus:outline-none">&plus;</button>
                        <span class="text-gray-600 text-sm font-bold whitespace-nowrap pr-1">人</span>
                    </div>

                    <!-- 抽後移除 -->
                    <label class="flex items-center gap-2 cursor-pointer bg-white/60 px-3 py-1.5 rounded-lg border border-gray-100 shadow-sm hover:bg-white transition">
                        <input type="checkbox" id="removeWinner" checked class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer">
                        <span class="font-bold text-gray-700 text-sm whitespace-nowrap select-none">抽後移除</span>
                    </label>
                </div>

                <!-- 開始按鈕 -->
                <button onclick="startDrawFlow()" class="w-full sm:w-auto flex-1 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-black py-2 md:py-3 px-6 rounded-xl shadow-lg transform transition active:scale-95 flex justify-center items-center gap-2 text-lg whitespace-nowrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m11.1 17.1 9.9-9.9"/><path d="M15 3h6v6"/><path d="M9 13v8l-4-4-4 4v-8"/><path d="M12 21h9"/></svg>
                    開始抽獎
                </button>
            </div>

            <!-- 遊戲模式切換 Tabs -->
            <div id="gameTabs" class="w-full mx-auto mb-2 flex-shrink-0 bg-white/60 backdrop-blur-md p-1.5 rounded-2xl flex flex-wrap gap-1 shadow-sm border border-white">
                <button id="tab-wheel" onclick="switchMode('wheel')" class="flex-1 py-2.5 rounded-xl font-bold text-indigo-700 bg-white shadow-sm transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]">
                    🎡 轉盤
                </button>
                <button id="tab-claw" onclick="switchMode('claw')" class="flex-1 py-2.5 rounded-xl font-medium text-gray-500 hover:text-indigo-600 hover:bg-white/50 transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]">
                    🕹️ 娃娃機
                </button>
                <button id="tab-card" onclick="switchMode('card')" class="flex-1 py-2.5 rounded-xl font-medium text-gray-500 hover:text-indigo-600 hover:bg-white/50 transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]">
                    🃏 翻牌
                </button>
                <button id="tab-scratch" onclick="switchMode('scratch')" class="flex-1 py-2.5 rounded-xl font-medium text-gray-500 hover:text-indigo-600 hover:bg-white/50 transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]">
                    🪄 刮刮樂
                </button>
                <button id="tab-gacha" onclick="switchMode('gacha')" class="flex-1 py-2.5 rounded-xl font-medium text-gray-500 hover:text-indigo-600 hover:bg-white/50 transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]">
                    🔴 扭蛋
                </button>
                <button id="tab-ladder" onclick="switchMode('ladder')" class="flex-1 py-2.5 rounded-xl font-medium text-gray-500 hover:text-indigo-600 hover:bg-white/50 transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]">
                    🪜 爬樓梯
                </button>
            </div>

            <!-- 遊戲主要顯示區 -->
            <div class="flex-1 w-full flex justify-center items-center min-h-0 overflow-hidden relative p-2 md:p-8">
                
                <!-- 1. 幸運轉盤 (Wheel) -->
                <div id="game-wheel" class="absolute inset-0 flex items-center justify-center transition-opacity duration-300 p-4">
                    <div class="relative max-h-full max-w-full aspect-square flex items-center justify-center">
                        <div class="absolute top-0 z-10 w-0 h-0 border-l-[12px] md:border-l-[15px] border-l-transparent border-r-[12px] md:border-r-[15px] border-r-transparent border-t-[25px] md:border-t-[30px] border-t-red-600 filter drop-shadow-md origin-top transform translate-y-1"></div>
                        <canvas id="wheelCanvas" width="600" height="600" class="w-full h-full object-contain rounded-full bg-white shadow-xl border-4 border-indigo-100"></canvas>
                        <div class="absolute inset-0 m-auto w-12 h-12 md:w-16 md:h-16 bg-white rounded-full shadow-inner border-[3px] border-indigo-100 flex items-center justify-center pointer-events-none">
                            <div class="w-6 h-6 md:w-8 md:h-8 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500"></div>
                        </div>
                    </div>
                </div>

                <!-- 2. 抓取娃娃機 (Claw Machine) -->
                <div id="game-claw" class="absolute inset-x-4 inset-y-4 md:inset-x-12 md:inset-y-12 flex justify-center items-center opacity-0 pointer-events-none transition-opacity duration-300">
                    <div class="relative w-full max-w-md h-full max-h-[350px] md:max-h-[400px] bg-sky-50 rounded-3xl border-[8px] border-sky-300 overflow-hidden shadow-2xl flex flex-col transition-all duration-300">
                        <!-- 娃娃機頂部軌道 -->
                        <div class="h-4 bg-sky-400 w-full shadow-inner z-20"></div>
                        <!-- 爪子總成 -->
                        <div id="clawArm" class="absolute top-4 left-1/2 -translate-x-1/2 flex flex-col items-center z-20 origin-top">
                            <!-- 繩子 -->
                            <div id="clawString" class="w-1.5 bg-gray-400 h-[20px]"></div>
                            <!-- 爪子本體 (三腳爪 SVG) 與 禮物容器 -->
                            <div id="clawIcon" class="relative w-16 h-16 -mt-2 flex justify-center">
                                <svg viewBox="0 0 100 100" class="w-full h-full overflow-visible drop-shadow-md relative z-20">
                                    <!-- 吊桿 -->
                                    <rect x="42" y="-10" width="16" height="30" fill="#64748b" rx="2" />
                                    <!-- 後方/中間爪 -->
                                    <path id="prong-mid" d="M 50 20 L 50 85 L 45 92" fill="none" stroke="#475569" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
                                    <!-- 左側爪 -->
                                    <path id="prong-left" d="M 40 20 Q 0 60 40 95 L 35 85" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" style="transform-origin: 40px 20px; transition: transform 0.5s ease-in-out; transform: rotate(35deg);" />
                                    <!-- 右側爪 -->
                                    <path id="prong-right" d="M 60 20 Q 100 60 60 95 L 65 85" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" style="transform-origin: 60px 20px; transition: transform 0.5s ease-in-out; transform: rotate(-35deg);" />
                                    <!-- 樞紐中心 -->
                                    <circle cx="50" cy="20" r="14" fill="#e2e8f0" stroke="#475569" stroke-width="4" />
                                    <circle cx="50" cy="20" r="5" fill="#94a3b8" />
                                </svg>
                                <!-- 抓到的禮物 -->
                                <div id="clawPrize" class="text-4xl absolute top-[25px] opacity-0 transition-opacity duration-300 drop-shadow-lg z-10">🎁</div>
                            </div>
                        </div>
                        <!-- 底部獎品堆 -->
                        <div class="absolute bottom-0 w-full h-[80px] md:h-[100px] bg-sky-100 flex flex-wrap justify-center content-end overflow-hidden z-10 pb-2">
                            <div class="text-4xl mx-1 -mt-2">🎁</div><div class="text-4xl mx-1 -mt-2">🔮</div><div class="text-4xl mx-1 -mt-2">🧸</div>
                            <div class="text-4xl mx-1 -mt-2">📦</div><div class="text-4xl mx-1 -mt-2">🎁</div><div class="text-4xl mx-1 -mt-2">🎀</div>
                            <div class="text-4xl mx-1 -mt-2">🧸</div><div class="text-4xl mx-1 -mt-2">🔮</div><div class="text-4xl mx-1 -mt-2">📦</div>
                        </div>
                        <!-- 玻璃反光 -->
                        <div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/30 to-white/0 pointer-events-none z-30"></div>
                    </div>
                </div>

                <!-- 3. 翻牌抽籤 (Card Flip) -->
                <div id="game-card" class="absolute inset-0 flex flex-col items-center justify-start opacity-0 pointer-events-none transition-opacity duration-300 p-2 md:p-6 bg-transparent">
                    <!-- 點擊提示文字與洗牌按鈕整合的區塊 -->
                    <div id="cardPromptContainer" class="flex flex-col items-center gap-3 mb-4 opacity-0 transition-opacity z-20 pointer-events-none mt-2">
                        <div id="cardPrompt" class="text-lg md:text-xl font-black text-white bg-indigo-600/90 backdrop-blur shadow-lg px-6 py-2.5 rounded-full drop-shadow-md flex-shrink-0 text-center">
                            請點擊卡片抽出幸運兒！
                        </div>
                        <button onclick="shuffleRemainingCards()" class="pointer-events-auto flex items-center justify-center gap-1.5 bg-gradient-to-r from-yellow-300 to-yellow-500 hover:from-yellow-400 hover:to-yellow-600 text-yellow-900 font-black px-5 py-2 rounded-full shadow-md transition active:scale-95 border-2 border-yellow-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.8 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/><path d="m18 14 4 4-4 4"/></svg>
                            洗牌換位
                        </button>
                    </div>
                    <!-- 卡片網格區塊 -->
                    <div id="cardGrid" class="w-full flex-1 flex flex-wrap justify-center content-start gap-2 md:gap-3 overflow-y-auto custom-scrollbar p-2 pb-10">
                        <!-- 卡片會由 JS 動態生成於此 -->
                    </div>
                </div>

                <!-- 3.5 刮刮樂 (Scratchcard) -->
                <div id="game-scratch" class="absolute inset-0 flex flex-col items-center justify-start opacity-0 pointer-events-none transition-opacity duration-300 p-2 md:p-6 bg-transparent">
                    <div id="scratchPromptContainer" class="flex flex-col items-center gap-3 mb-4 opacity-0 transition-opacity z-20 pointer-events-none mt-2">
                        <div id="scratchPrompt" class="text-lg md:text-xl font-black text-white bg-indigo-600/90 backdrop-blur shadow-lg px-6 py-2.5 rounded-full drop-shadow-md flex-shrink-0 text-center">
                            請在卡片上來回刮開塗層！
                        </div>
                        <button onclick="shuffleRemainingScratches()" class="pointer-events-auto flex items-center justify-center gap-1.5 bg-gradient-to-r from-yellow-300 to-yellow-500 hover:from-yellow-400 hover:to-yellow-600 text-yellow-900 font-black px-5 py-2 rounded-full shadow-md transition active:scale-95 border-2 border-yellow-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.8 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/><path d="m18 14 4 4-4 4"/></svg>
                            洗牌換位
                        </button>
                    </div>
                    <!-- 刮刮樂網格區塊 -->
                    <div id="scratchGrid" class="w-full flex-1 flex flex-wrap justify-center content-start gap-2 md:gap-3 overflow-y-auto custom-scrollbar p-2 pb-10">
                        <!-- 卡片會由 JS 動態生成於此 -->
                    </div>
                </div>

                <!-- 4. 扭蛋機 (Gachapon) -->
                <div id="game-gacha" class="absolute inset-0 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4">
                    <div class="relative w-full max-w-[280px] md:max-w-[320px] aspect-[3/4] flex flex-col items-center mt-6">
                        <!-- 頂部招牌 -->
                        <div class="absolute -top-5 bg-red-600 text-white font-black px-6 py-2 rounded-full border-4 border-yellow-400 z-30 shadow-lg transform -rotate-3 tracking-widest text-sm md:text-base">
                            LUCKY GACHA
                        </div>
                        <!-- 玻璃罩 -->
                        <div class="relative w-[240px] h-[240px] md:w-[280px] md:h-[280px] bg-sky-50/50 backdrop-blur-sm border-[10px] border-red-500 rounded-full overflow-hidden shadow-[inset_0_0_30px_rgba(0,0,0,0.15)] flex flex-wrap justify-center content-end pb-2 z-20">
                            <!-- 裡面的扭蛋群 -->
                            <div id="gachaBalls" class="flex flex-wrap justify-center content-end w-[90%] h-[90%] gap-1 pb-4">
                                <!-- 扭蛋會由 JS 生成 -->
                            </div>
                            <!-- 玻璃反光 -->
                            <div class="absolute inset-0 bg-gradient-to-tr from-white/20 via-white/40 to-transparent pointer-events-none rounded-full z-30"></div>
                        </div>
                        <!-- 機台本體 -->
                        <div class="relative w-[260px] md:w-[300px] h-[200px] md:h-[220px] bg-red-500 rounded-b-3xl -mt-10 shadow-2xl flex flex-col items-center pt-14 z-10 border-x-4 border-b-4 border-red-700">
                            <!-- 轉盤/旋鈕 -->
                            <div class="flex gap-4 items-center">
                                <div class="w-6 h-10 bg-gray-800 rounded-md shadow-inner flex justify-center pt-1"><div class="w-1.5 h-5 bg-gray-600 rounded-full"></div></div>
                                <div id="gachaDial" class="w-20 h-20 bg-gray-100 rounded-full border-4 border-gray-300 flex items-center justify-center shadow-md transition-transform duration-700 ease-in-out">
                                    <div class="w-14 h-4 bg-gray-400 rounded-full shadow-sm"></div>
                                </div>
                                <div class="w-6 h-10 bg-gray-800 rounded-md shadow-inner flex justify-center pt-1"><div class="w-1.5 h-5 bg-gray-600 rounded-full"></div></div>
                            </div>
                            <!-- 出口 -->
                            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-24 h-20 bg-gray-900 rounded-xl shadow-[inset_0_10px_20px_rgba(0,0,0,0.5)] overflow-hidden flex justify-center items-end pb-2 border-b-4 border-red-800">
                                <!-- 掉下來的扭蛋 -->
                                <div id="gachaPrize" class="text-5xl transform -translate-y-24 transition-transform duration-500 z-10">🥚</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 5. 爬樓梯 (Ladder/Ghost Leg) -->
                <div id="game-ladder" class="absolute inset-0 flex items-start justify-start opacity-0 pointer-events-none transition-opacity duration-300 bg-white rounded-3xl border-4 border-indigo-50 shadow-inner overflow-x-auto overflow-y-hidden custom-scrollbar">
                    <canvas id="ladderCanvas" class="block h-full"></canvas>
                </div>

                <!-- 抽中訊息 (共用於所有遊戲，直接顯示在中間) -->
                <div id="centerSplash" class="absolute inset-0 flex items-center justify-center z-40 opacity-0 pointer-events-none transition-all duration-500 transform scale-50">
                    <div class="bg-white/95 backdrop-blur-sm shadow-2xl rounded-[30px] aspect-square flex flex-col items-center justify-center p-4 border-[6px] border-yellow-400 w-[85%] max-w-[400px]">
                        <span class="text-yellow-600 font-bold text-lg md:text-2xl mb-3 md:mb-5">🎉 恭喜中獎 🎉</span>
                        <strong id="splashWinnerName" class="text-6xl md:text-[5rem] font-black text-indigo-700 text-center truncate w-full px-4 leading-tight"></strong>
                        <span id="splashNextText" class="text-sm md:text-base text-gray-500 mt-4 font-medium hidden">自動抽取下一位...</span>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- 提示對話框：為了確保不被置左，JS 會動態補上 flex 屬性，並加上 w-full h-full 確保覆蓋全螢幕 -->
    <div id="modal" class="fixed inset-0 w-full h-full bg-gray-900/60 backdrop-blur-sm hidden items-center justify-center z-[80] transition-opacity opacity-0">
        <div class="bg-white rounded-3xl shadow-2xl p-6 md:p-10 max-w-lg w-[90%] transform scale-95 transition-transform" id="modalContent">
            <div id="modalIcon" class="mx-auto w-16 h-16 md:w-20 md:h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-4 md:mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
            </div>
            <h3 id="modalTitle" class="text-2xl md:text-4xl font-black text-center text-gray-800 mb-3 md:mb-4">標題</h3>
            <div id="modalMessage" class="w-full flex flex-col items-center justify-center text-center text-gray-600 mb-6 md:mb-8 text-lg md:text-xl px-1">訊息內容</div>
            <div class="flex justify-center">
                <button onclick="closeModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 px-10 rounded-xl shadow-lg transition active:scale-95 w-full text-xl md:text-2xl tracking-wider">確定</button>
            </div>
        </div>
    </div>

    <script>
        // --- 變數初始化 ---
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const ladderCanvas = document.getElementById('ladderCanvas');
        const ladderCtx = ladderCanvas.getContext('2d');
        const nameListInput = document.getElementById('nameList');
        const peopleCountSpan = document.getElementById('peopleCount');
        const winnersContainer = document.getElementById('winnersContainer');
        const winnerCountDisplay = document.getElementById('winnerCountDisplay');
        const excelUploadInput = document.getElementById('excelUpload');
        const gameArea = document.getElementById('gameArea');

        let names = [];
        let winners = [];
        
        // 遊戲模式切換控制
        let currentMode = 'wheel'; // 'wheel', 'claw', 'card', 'scratch', 'gacha', 'ladder'
        let isSpinning = false;
        
        // 轉盤變數
        let currentRotation = 0;
        let spinVelocity = 0;
        let animationFrameId;

        // 爬樓梯變數
        let ladderBridges = [];
        let lastLadderNameCount = 0;
        let ladderAnimState = { active: false, points: [], currentIdx: 0, progress: 0, startCol: -1 };

        // 抽獎流程控制
        let currentBatchTarget = 0;
        let currentBatchDrawn = 0;
        let currentBatchWinners = [];
        let autoNextTimeout = null;
        let waitingForCardClick = false; // 翻牌模式專用
        let waitingForScratchClick = false; // 刮刮樂模式專用

        // 綁定 UI 元素
        const centerSplash = document.getElementById('centerSplash');
        const splashWinnerName = document.getElementById('splashWinnerName');
        const splashNextText = document.getElementById('splashNextText');
        const gameWheel = document.getElementById('game-wheel');
        const gameClaw = document.getElementById('game-claw');
        const gameCard = document.getElementById('game-card');
        const gameScratch = document.getElementById('game-scratch');
        const gameGacha = document.getElementById('game-gacha');
        const gameLadder = document.getElementById('game-ladder');
        const clawArm = document.getElementById('clawArm');
        const clawString = document.getElementById('clawString');
        const clawPrize = document.getElementById('clawPrize');
        const gachaBalls = document.getElementById('gachaBalls');
        const gachaDial = document.getElementById('gachaDial');
        const gachaPrize = document.getElementById('gachaPrize');

        const defaultNames = ["小明", "小華", "小美", "小強", "小玉", "阿杰", "阿婷", "小安"];

        // --- 初始化與事件綁定 ---
        function init() {
            nameListInput.innerText = defaultNames.join('\n');
            updateNamesArray();
            drawWheel();

            nameListInput.addEventListener('input', () => {
                updateNamesArray();
                if (currentMode === 'wheel') drawWheel();
            });

            // 防止帶有格式的文字貼上
            nameListInput.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });

            excelUploadInput.addEventListener('change', handleExcelUpload);

            // 綁定 ESC 鍵退出全螢幕
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    exitFullscreen();
                }
            });

            // 監聽視窗大小改變，重繪畫布以免變形
            window.addEventListener('resize', () => {
                if (currentMode === 'wheel') drawWheel();
                if (currentMode === 'ladder' && !isSpinning) initLadder();
            });
        }

        // --- 調整抽出人數按鈕邏輯 ---
        function adjustWinnerCount(change) {
            const input = document.getElementById('winnerCount');
            let current = parseInt(input.value, 10);
            if (isNaN(current)) current = 1;
            let next = current + change;
            if (next < 1) next = 1;
            input.value = next;
        }

        // --- 全螢幕控制 ---
        function enterFullscreen() {
            gameArea.classList.add('fullscreen-active');
        }

        function exitFullscreen() {
            gameArea.classList.remove('fullscreen-active');
            // 確保退出時重新渲染轉盤以避免變形
            if (currentMode === 'wheel') {
                setTimeout(drawWheel, 100); 
            } else if (currentMode === 'ladder' && !isSpinning) {
                setTimeout(initLadder, 100); 
            }
        }

        function updateNamesArray() {
            names = nameListInput.innerText.split('\n')
                        .map(n => n.trim())
                        .filter(n => n.length > 0);
            peopleCountSpan.textContent = names.length;
            
            // 如果在其他模式且沒有在抽獎，即時更新該模式的資料
            if (currentMode === 'card' && !isSpinning) initCardGrid();
            if (currentMode === 'scratch' && !isSpinning) initScratchGrid();
            if (currentMode === 'gacha' && !isSpinning) initGachaBalls();
            if (currentMode === 'ladder' && !isSpinning) initLadder();
        }

        function resetList() {
            nameListInput.innerText = '';
            updateNamesArray();
            if (currentMode === 'wheel') drawWheel();
        }

        // --- 遊戲模式切換 ---
        function switchMode(mode) {
            if (isSpinning) return; // 抽獎中禁止切換
            currentMode = mode;

            // 更新 Tabs 樣式
            const tabs = ['wheel', 'claw', 'card', 'scratch', 'gacha', 'ladder'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === mode) {
                    btn.className = "flex-1 py-2.5 rounded-xl font-bold text-indigo-700 bg-white shadow-sm transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]";
                } else {
                    btn.className = "flex-1 py-2.5 rounded-xl font-medium text-gray-500 hover:text-indigo-600 hover:bg-white/50 transition-all text-sm md:text-base flex items-center justify-center gap-1.5 min-w-[70px]";
                }
            });

            // 隱藏所有遊戲畫面
            gameWheel.classList.remove('opacity-100', 'pointer-events-auto');
            gameWheel.classList.add('opacity-0', 'pointer-events-none');
            gameClaw.classList.remove('opacity-100', 'pointer-events-auto');
            gameClaw.classList.add('opacity-0', 'pointer-events-none');
            gameCard.classList.remove('opacity-100', 'pointer-events-auto');
            gameCard.classList.add('opacity-0', 'pointer-events-none');
            gameScratch.classList.remove('opacity-100', 'pointer-events-auto');
            gameScratch.classList.add('opacity-0', 'pointer-events-none');
            gameGacha.classList.remove('opacity-100', 'pointer-events-auto');
            gameGacha.classList.add('opacity-0', 'pointer-events-none');
            gameLadder.classList.remove('opacity-100', 'pointer-events-auto');
            gameLadder.classList.add('opacity-0', 'pointer-events-none');

            // 顯示選擇的遊戲畫面
            if (mode === 'wheel') {
                gameWheel.classList.remove('opacity-0', 'pointer-events-none');
                gameWheel.classList.add('opacity-100', 'pointer-events-auto');
                drawWheel(); // 確保重新渲染
            } else if (mode === 'claw') {
                gameClaw.classList.remove('opacity-0', 'pointer-events-none');
                gameClaw.classList.add('opacity-100', 'pointer-events-auto');
                // 復原爪子狀態
                clawArm.style.transition = 'none';
                clawArm.style.transform = 'translateX(-50%)';
                clawString.style.transition = 'none';
                clawString.style.height = '20px';
                clawPrize.classList.add('opacity-0');
                document.getElementById('prong-left').style.transform = 'rotate(35deg)';
                document.getElementById('prong-right').style.transform = 'rotate(-35deg)';
            } else if (mode === 'card') {
                gameCard.classList.remove('opacity-0', 'pointer-events-none');
                gameCard.classList.add('opacity-100', 'pointer-events-auto');
                initCardGrid(); // 繪製翻牌網格
            } else if (mode === 'scratch') {
                gameScratch.classList.remove('opacity-0', 'pointer-events-none');
                gameScratch.classList.add('opacity-100', 'pointer-events-auto');
                initScratchGrid(); // 繪製刮刮樂網格
            } else if (mode === 'gacha') {
                gameGacha.classList.remove('opacity-0', 'pointer-events-none');
                gameGacha.classList.add('opacity-100', 'pointer-events-auto');
                gachaDial.style.transform = 'rotate(0deg)';
                gachaPrize.style.transform = 'translateY(-100px)';
                gachaPrize.innerHTML = '🥚';
                initGachaBalls(); // 繪製扭蛋球
            } else if (mode === 'ladder') {
                gameLadder.classList.remove('opacity-0', 'pointer-events-none');
                gameLadder.classList.add('opacity-100', 'pointer-events-auto');
                // 延遲一點點確保 display 已經生效，能抓到正確的高寬
                setTimeout(initLadder, 20);
            }
        }

        // --- Excel 匯入與匯出 ---
        function downloadTemplate() {
            try {
                const templateData = [ ["名單 (請在下方開始填寫名字)"], ["王小明"], ["陳大牛"], ["林阿花"], ["張小玉"] ];
                const ws = XLSX.utils.aoa_to_sheet(templateData);
                ws['!cols'] = [{ wpx: 250 }];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "名單");
                XLSX.writeFile(wb, "幸運抽籤名單範本.xlsx");
            } catch (error) {
                showModal('錯誤', '下載範本失敗，請稍後再試。', 'error');
            }
        }

        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                    
                    let importedNames = [];
                    for(let i = 0; i < json.length; i++) {
                        if(json[i] && json[i][0] !== undefined) {
                            let val = String(json[i][0]).trim();
                            if(i === 0 && val.includes("名單")) continue;
                            if(val) importedNames.push(val);
                        }
                    }

                    if(importedNames.length > 0) {
                        const currentVal = nameListInput.innerText.trim();
                        const newVal = currentVal ? currentVal + '\n' + importedNames.join('\n') : importedNames.join('\n');
                        nameListInput.innerText = newVal;
                        updateNamesArray();
                        
                        showModal('匯入成功', `成功從 Excel 匯入 <strong class="text-indigo-600">${importedNames.length}</strong> 筆名單！`, 'success');
                    } else {
                        showModal('匯入失敗', '找不到有效的名單資料。', 'error');
                    }
                } catch (error) {
                    showModal('讀取失敗', '無法解析此檔案。', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
            e.target.value = '';
        }

        // --- 轉盤繪製邏輯 ---
        function drawWheel() {
            const width = canvas.width;
            const height = canvas.height;
            const cx = width / 2;
            const cy = height / 2;
            const radius = Math.min(cx, cy) - 10; 

            ctx.clearRect(0, 0, width, height);

            if (names.length === 0) {
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
                ctx.fillStyle = '#f3f4f6';
                ctx.fill();
                ctx.strokeStyle = '#e5e7eb';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                ctx.fillStyle = '#9ca3af';
                ctx.font = 'bold 24px "Noto Sans TC"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('請輸入名單', cx, cy);
                return;
            }

            const sliceAngle = (2 * Math.PI) / names.length;

            for (let i = 0; i < names.length; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, currentRotation + i * sliceAngle, currentRotation + (i + 1) * sliceAngle);
                ctx.lineTo(cx, cy);
                
                ctx.fillStyle = `hsl(${(i * 360) / names.length}, 75%, 65%)`;
                ctx.fill();
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                const textAngle = currentRotation + i * sliceAngle + sliceAngle / 2;
                ctx.rotate(textAngle);
                
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                
                let fontSize = names.length > 20 ? 16 : (names.length > 10 ? 22 : 30);
                ctx.font = `bold ${fontSize}px "Noto Sans TC"`;
                
                let text = names[i];
                if (text.length > 12) text = text.substring(0, 11) + '...';
                
                ctx.fillText(text, radius - 30, 0);
                ctx.restore();
            }
        }

        // --- 陣列洗牌工具函數 ---
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // --- 翻牌模式：生成卡片網格與洗牌功能 ---
        const cardGradients = [
            'from-indigo-400 to-purple-500',
            'from-pink-400 to-rose-500',
            'from-amber-400 to-orange-500',
            'from-emerald-400 to-teal-500',
            'from-cyan-400 to-blue-500',
            'from-violet-400 to-fuchsia-500',
            'from-red-400 to-rose-500',
            'from-sky-400 to-indigo-500'
        ];

        function initCardGrid() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            
            if (names.length === 0) return;

            // 將當前名單複製並洗牌，讓每張卡片都有對應的人
            const shuffledNames = shuffleArray(names);
            
            // 根據名單人數，動態調整卡片大小
            let cardW = 'w-20 md:w-28';
            let cardH = 'h-28 md:h-36';
            let textSz = 'text-lg md:text-xl';
            
            if (names.length > 80) {
                cardW = 'w-10 md:w-14'; cardH = 'h-14 md:h-20'; textSz = 'text-[10px] md:text-xs';
            } else if (names.length > 40) {
                cardW = 'w-12 md:w-16'; cardH = 'h-16 md:h-24'; textSz = 'text-xs md:text-sm';
            } else if (names.length > 20) {
                cardW = 'w-16 md:w-20'; cardH = 'h-24 md:h-28'; textSz = 'text-sm md:text-base';
            }

            // 生成卡片並加入點擊事件
            for (let i = 0; i < shuffledNames.length; i++) {
                const winnerName = shuffledNames[i];
                const card = document.createElement('div');
                card.className = `card ${cardW} ${cardH} perspective cursor-pointer transform hover:-translate-y-1 transition-transform`;
                
                // 隨機選一個彩色漸層背景
                const randomBgClass = cardGradients[Math.floor(Math.random() * cardGradients.length)];

                // 將名字直接寫入卡片背面的 HTML 中，並用 data 屬性綁定
                card.dataset.name = winnerName;
                card.innerHTML = `
                    <div class="card-inner relative w-full h-full preserve-3d transition-transform duration-500">
                        <!-- 卡片背面 (顯示問號與彩色漸層) -->
                        <div class="absolute inset-0 backface-hidden bg-gradient-to-br ${randomBgClass} rounded-xl shadow-md border-2 border-white/50 flex items-center justify-center text-white text-2xl md:text-3xl">
                            ❓
                        </div>
                        <!-- 卡片正面 (翻開後顯示名字) -->
                        <div class="back absolute inset-0 backface-hidden rotate-y-180 bg-white rounded-xl shadow-lg border-2 border-indigo-400 flex items-center justify-center text-center p-1 md:p-2 text-indigo-700 font-bold overflow-hidden break-all ${textSz} flex-col justify-center">
                            ${winnerName}
                        </div>
                    </div>
                `;
                card.onclick = () => handleCardClick(card);
                grid.appendChild(card);
            }
        }

        // 獨立出洗牌核心邏輯，讓自動動畫與手動按鈕共用
        function executeCardShuffleLogic() {
            // 只抓取「還沒翻開」的卡片
            const unflippedCards = document.querySelectorAll('#cardGrid .card:not(.flipped)');
            if (unflippedCards.length <= 1) return;

            // 取出這些卡片背後綁定的名字
            let remainingNames = Array.from(unflippedCards).map(c => c.dataset.name);
            
            // 重新洗牌
            remainingNames = shuffleArray(remainingNames);

            // 把洗牌後的名字重新綁回這些未翻開的卡片，並加上隨機顏色與抖動動畫
            unflippedCards.forEach((card, i) => {
                const newName = remainingNames[i];
                card.dataset.name = newName;
                card.querySelector('.back').textContent = newName;
                
                // 隨機換一個新顏色
                const randomBgClass = cardGradients[Math.floor(Math.random() * cardGradients.length)];
                const frontDiv = card.querySelector('.backface-hidden:not(.back)');
                // 移除舊的漸層
                cardGradients.forEach(grad => {
                    grad.split(' ').forEach(cls => frontDiv.classList.remove(cls));
                });
                // 加上新的漸層
                randomBgClass.split(' ').forEach(cls => frontDiv.classList.add(cls));

                // 觸發洗牌抖動動畫
                card.classList.remove('animate-card-shuffle');
                void card.offsetWidth; // 強制重繪
                card.classList.add('animate-card-shuffle');
            });
        }

        // 獨立出「亮牌 -> 蓋牌 -> 洗牌」的動畫流程，讓每次抽取都可以呼叫
        function doCardRevealAndShuffle(callback) {
            const unflippedCards = document.querySelectorAll('#cardGrid .card:not(.flipped)');
            if (unflippedCards.length === 0) {
                if (callback) callback();
                return;
            }

            // 1. 先掀開檯面上還沒翻開的牌
            unflippedCards.forEach(c => c.classList.add('flipped'));

            // 2. 停留 2 秒讓大家看清楚位置，然後全部蓋上
            setTimeout(() => {
                unflippedCards.forEach(c => c.classList.remove('flipped'));

                // 3. 等待蓋牌動畫結束(約 0.6s) 後，自動觸發大洗牌
                setTimeout(() => {
                    executeCardShuffleLogic();

                    // 4. 洗牌動畫結束後，執行回呼函式(解鎖點擊按鈕)
                    setTimeout(() => {
                        if (callback) callback();
                    }, 600);
                }, 600);
            }, 2000);
        }

        // 手動洗牌換位按鈕綁定的函式
        function shuffleRemainingCards() {
            if (!waitingForCardClick) return; // 防呆：如果已經點了卡片正在翻轉，就不能洗牌
            executeCardShuffleLogic();
        }

        // --- 刮刮樂模式：生成刮刮卡網格與邏輯 ---
        function initScratchGrid() {
            const grid = document.getElementById('scratchGrid');
            grid.innerHTML = '';
            
            if (names.length === 0) return;

            const shuffledNames = shuffleArray(names);
            
            let cardW = 'w-20 md:w-28';
            let cardH = 'h-28 md:h-36';
            let textSz = 'text-lg md:text-xl';
            
            if (names.length > 80) {
                cardW = 'w-10 md:w-14'; cardH = 'h-14 md:h-20'; textSz = 'text-[10px] md:text-xs';
            } else if (names.length > 40) {
                cardW = 'w-12 md:w-16'; cardH = 'h-16 md:h-24'; textSz = 'text-xs md:text-sm';
            } else if (names.length > 20) {
                cardW = 'w-16 md:w-20'; cardH = 'h-24 md:h-28'; textSz = 'text-sm md:text-base';
            }

            for (let i = 0; i < shuffledNames.length; i++) {
                const winnerName = shuffledNames[i];
                const card = document.createElement('div');
                // 替換原有的框線設計以匹配彩色背景
                card.className = `scratch-card relative ${cardW} ${cardH} rounded-xl shadow-md border-2 border-white overflow-hidden bg-white transform transition-transform`;
                card.dataset.name = winnerName;

                // 隨機選一個彩色漸層背景
                const randomBgClass = cardGradients[Math.floor(Math.random() * cardGradients.length)];

                // 底部名字 (加上彩色漸層背景)
                const inner = document.createElement('div');
                inner.className = `absolute inset-0 flex items-center justify-center text-center p-1 md:p-2 text-white font-bold overflow-hidden break-all ${textSz} flex-col justify-center bg-gradient-to-br ${randomBgClass} inner-bg`;
                inner.textContent = winnerName;
                card.appendChild(inner);

                // 上層覆蓋的 Canvas
                const canvas = document.createElement('canvas');
                canvas.width = 150; // 固定內部解析度
                canvas.height = 200;
                canvas.className = 'absolute inset-0 w-full h-full z-10 transition-opacity duration-500 cursor-pointer scratch-canvas';
                card.appendChild(canvas);

                setupScratchCanvas(canvas, card);
                grid.appendChild(card);
            }
        }

        function setupScratchCanvas(canvas, cardElement) {
            const ctx = canvas.getContext('2d');
            
            // 繪製刮刮樂銀色塗層
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#cbd5e1'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 寫上提示字
            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 36px "Noto Sans TC"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('刮', canvas.width / 2, canvas.height / 2);

            let isDrawing = false;
            let scratchCount = 0;

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (canvas.width / rect.width),
                    y: (clientY - rect.top) * (canvas.height / rect.height)
                };
            };

            const scratch = (e) => {
                if (!isDrawing || cardElement.classList.contains('scratched') || !waitingForScratchClick) return;
                if (e.cancelable) e.preventDefault(); // 防止手機滑動

                const pos = getPos(e);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 30; // 刮除的筆刷大小
                ctx.lineCap = 'round';
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);

                scratchCount++;
                // 當刮除次數達到閥值，自動解鎖這張卡片
                if (scratchCount > 25) { 
                    revealScratch(cardElement);
                }
            };

            const start = (e) => {
                if (cardElement.classList.contains('scratched') || !waitingForScratchClick) return;
                if (e.cancelable) e.preventDefault();
                isDrawing = true;
                ctx.beginPath();
                scratch(e);
            };

            const end = () => { isDrawing = false; };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', scratch);
            window.addEventListener('mouseup', end);
            
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', scratch, { passive: false });
            window.addEventListener('touchend', end);
        }

        function revealScratch(cardElement) {
            if (!waitingForScratchClick) return;
            waitingForScratchClick = false; // 鎖定全局，不讓別人繼續刮

            // 隱藏提示列
            const promptContainer = document.getElementById('scratchPromptContainer');
            promptContainer.classList.add('opacity-0');
            promptContainer.classList.add('pointer-events-none');

            // 觸發淡出動畫並加上發光特效
            cardElement.classList.add('scratched');
            cardElement.classList.add('ring-4', 'ring-yellow-400', 'shadow-xl');
            const canvas = cardElement.querySelector('canvas');
            canvas.style.opacity = '0'; 
            canvas.style.pointerEvents = 'none';

            const winner = cardElement.dataset.name;
            const winnerIndex = names.indexOf(winner);

            setTimeout(() => {
                processWinner(winner, winnerIndex !== -1 ? winnerIndex : 0);
            }, 800);
        }

        function shuffleRemainingScratches() {
            if (!waitingForScratchClick) return;

            const unscratchedCards = document.querySelectorAll('#scratchGrid .scratch-card:not(.scratched)');
            if (unscratchedCards.length <= 1) return;

            let remainingNames = Array.from(unscratchedCards).map(c => c.dataset.name);
            remainingNames = shuffleArray(remainingNames);

            unscratchedCards.forEach((card, i) => {
                const newName = remainingNames[i];
                card.dataset.name = newName;
                
                const inner = card.querySelector('div.inner-bg');
                inner.textContent = newName;

                // 隨機換一個新顏色
                const randomBgClass = cardGradients[Math.floor(Math.random() * cardGradients.length)];
                cardGradients.forEach(grad => {
                    grad.split(' ').forEach(cls => inner.classList.remove(cls));
                });
                randomBgClass.split(' ').forEach(cls => inner.classList.add(cls));

                // 為了安全重置 Canvas 狀態，直接替換一個全新的 Canvas 元素
                const oldCanvas = card.querySelector('canvas');
                const newCanvas = document.createElement('canvas');
                newCanvas.width = 150;
                newCanvas.height = 200;
                newCanvas.className = 'absolute inset-0 w-full h-full z-10 transition-opacity duration-500 cursor-pointer scratch-canvas';
                card.replaceChild(newCanvas, oldCanvas);
                setupScratchCanvas(newCanvas, card);

                // 加入洗牌動畫
                card.classList.remove('animate-card-shuffle');
                void card.offsetWidth;
                card.classList.add('animate-card-shuffle');
            });
        }

        // --- 扭蛋模式：生成扭蛋球 ---
        function initGachaBalls() {
            gachaBalls.innerHTML = '';
            const colors = [
                'bg-red-400', 'bg-blue-400', 'bg-green-400', 'bg-yellow-400', 
                'bg-purple-400', 'bg-pink-400', 'bg-orange-400', 'bg-teal-400'
            ];
            // 隨著名單人數生成扭蛋，上限 50 顆以免畫面過載
            const ballCount = Math.min(names.length, 50); 
            
            for (let i = 0; i < ballCount; i++) {
                const colorClass = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.random() * 10 + 30; // 30px ~ 40px 的隨機大小
                const ball = document.createElement('div');
                ball.className = `rounded-full ${colorClass} shadow-[inset_-5px_-5px_15px_rgba(0,0,0,0.3)] border border-white/20 flex-shrink-0`;
                ball.style.width = `${size}px`;
                ball.style.height = `${size}px`;
